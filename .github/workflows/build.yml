name: build

on:
  # push:
  #   branches: [main, master]
  # pull_request:
  workflow_dispatch:

jobs:
  iso:
    name: Build x86_64 live ISO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check
        run: nix flake check --no-build

      - name: Build ISO
        run: nix build .#nixosConfigurations.dashboard-x86.config.system.build.isoImage

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ha-dashboard-x86-iso
          path: result/iso/*.iso
          if-no-files-found: error
