name: build

# Manual dev builds. Produces the same flashable x86_64 disk image as the
# release workflow (disko btrfs+zstd raw, zstd-compressed), but stamps it with the
# build date + commit SHA and publishes it to a separate `dev/` prefix in R2
# (never a tag, never a GitHub Release). Set an R2 lifecycle rule to expire
# objects under `dev/` so these snapshots clean themselves up.
#
# Uses the same repo config as release.yml (vars R2_ACCOUNT_ID / R2_BUCKET /
# R2_PUBLIC_URL, secrets R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY). The R2 upload
# is skipped when R2_BUCKET is unset, so contributors without those secrets
# still get the ISO as a workflow artifact.
on:
  workflow_dispatch:

jobs:
  iso:
    name: Build x86_64 live ISO
    runs-on: ubuntu-latest
    env:
      R2_ENDPOINT: https://${{ vars.R2_ACCOUNT_ID }}.eu.r2.cloudflarestorage.com
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check
        run: nix flake check --no-build

      - name: Build disk image
        run: nix build .#disk-image

      # Date first so the bucket listing sorts chronologically; short SHA pins it
      # to the exact commit. Compress straight from the Nix store so we never
      # keep a second uncompressed copy of the multi-GB raw on the runner.
      - name: Compress disk image under a dated, commit-stamped name
        id: stage
        run: |
          set -euo pipefail
          asset="ha-dashboard-$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}-x86_64.raw.zst"
          zstd -19 -T0 -c "$(readlink -f result)/ha-dashboard.raw" > "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ha-dashboard-x86-image
          path: ${{ steps.stage.outputs.asset }}
          if-no-files-found: error

      # Publish under dev/ (separate from tagged releases). Skipped without R2
      # config so the build still succeeds and leaves the artifact above.
      - name: Upload dev build to R2
        if: ${{ vars.R2_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          asset="${{ steps.stage.outputs.asset }}"
          bucket="${{ vars.R2_BUCKET }}"
          aws s3 cp "$asset" "s3://$bucket/dev/$asset" \
            --endpoint-url "$R2_ENDPOINT"
          {
            echo "### 📦 Dev build published"
            echo
            echo "**[$asset](${{ vars.R2_PUBLIC_URL }}/dev/$asset)** — commit ${GITHUB_SHA::7}"
          } >> "$GITHUB_STEP_SUMMARY"
