name: release

# Publish a GitHub Release when a v* tag is pushed. The dashboards poll
# /releases/latest to advertise the "latest" version, so a Release object (not
# just a bare tag) must exist for the in-place update entity to offer it.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so generated notes can diff from the last tag

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
